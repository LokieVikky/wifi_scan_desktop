name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*.*.*'   

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write 
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Publish
        run: flutter pub publish --force
